<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التدرب على جدول الضرب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6E9;
    --panel:#FFFFFF;
    --panel-alt:#F1E9D2;
    --ink:#1F2A26;
    --ink-dim:#4B5A53;
    --yellow:#C98A12;
    --blue:#1D6E8E;
    --lilac:#6A4FA8;
    --coral:#C8401F;
    --green-ok:#2E8B4F;
    --line: rgba(31,42,38,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--bg);
    font-family:'Tajawal', sans-serif;
    font-weight:500;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:20px 14px 60px;
  }
  #app{ width:100%; max-width:560px; }

  .brand{ text-align:center; margin-bottom:18px; }
  .brand h1{
    font-family:'Reem Kufi', sans-serif;
    font-weight:700;
    font-size:2.05rem;
    margin:0;
    letter-spacing:.5px;
    color:var(--ink);
  }
  .brand p{
    margin:6px 0 0;
    color:var(--ink-dim);
    font-weight:700;
    font-size:.88rem;
  }

  .stats-bar{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .stat-chip{
    background:var(--panel);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:8px 16px;
    font-size:.9rem;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--ink);
  }
  .stat-chip b{ font-size:1.1rem; font-family:'Reem Kufi', sans-serif; font-weight:700; color:var(--ink); }

  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ---------- Home / level path ---------- */
  .path-wrap{ position:relative; padding:10px 0 20px; }
  .path-line{
    position:absolute;
    right:38px;
    top:34px;
    bottom:34px;
    width:0;
    border-right:3px dashed var(--line);
  }
  .level-row{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    margin:12px 0;
    z-index:1;
  }
  .level-row.is-test{ margin:16px 0; }
  .medallion{
    flex:0 0 76px;
    width:76px; height:76px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Reem Kufi', sans-serif;
    font-weight:700;
    font-size:1.5rem;
    background:var(--panel);
    border:4px solid var(--ink);
    cursor:pointer;
    position:relative;
    transition:transform .15s ease;
    flex-shrink:0;
  }
  .medallion:hover{ transform:scale(1.05); }
  .medallion.c-yellow{ border-color:var(--yellow); color:var(--yellow); }
  .medallion.c-blue{ border-color:var(--blue); color:var(--blue); }
  .medallion.c-lilac{ border-color:var(--lilac); color:var(--lilac); }
  .medallion.c-coral{ border-color:var(--coral); color:var(--coral); }
  .medallion.is-test{ font-size:1.3rem; }
  .medallion .badge-done{
    position:absolute; top:-6px; left:-6px;
    background:var(--green-ok);
    color:#FFFFFF;
    border-radius:50%;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    font-size:.8rem;
    font-weight:700;
    border:2px solid var(--bg);
  }
  .level-info{ flex:1; }
  .level-info h3{ margin:0 0 2px; font-family:'Reem Kufi', sans-serif; font-weight:700; font-size:1.08rem; color:var(--ink); }
  .level-info span.range{ color:var(--ink-dim); font-weight:700; font-size:.83rem; }
  .mistake-link{
    display:inline-block;
    margin-top:5px;
    font-size:.8rem;
    font-weight:700;
    color:#FFFFFF;
    background:var(--coral);
    border-radius:10px;
    padding:3px 10px;
    cursor:pointer;
  }

  /* ---------- Game screen ---------- */
  .game-card{
    background:var(--panel);
    border:2px solid var(--ink);
    border-radius:22px;
    padding:26px 20px;
    text-align:center;
  }
  .game-progress{
    font-size:.85rem;
    font-weight:700;
    color:var(--ink-dim);
    margin-bottom:10px;
  }
  .target-circle{
    width:150px; height:150px;
    border-radius:50%;
    border:5px solid var(--yellow);
    margin:0 auto 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Reem Kufi', sans-serif;
    font-weight:700;
    font-size:3.6rem;
    color:var(--ink);
    background:var(--panel-alt);
  }
  .hint{ color:var(--ink-dim); font-weight:700; font-size:.85rem; margin-bottom:16px; }
  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
  }
  .opt-tile{
    background:var(--panel-alt);
    border:3px solid var(--ink);
    border-radius:14px;
    padding:16px 8px;
    font-family:'Reem Kufi', sans-serif;
    font-weight:700;
    font-size:1.35rem;
    color:var(--ink);
    cursor:pointer;
    transition:.12s ease;
    user-select:none;
  }
  .opt-tile.selected{ border-color:var(--yellow); background:#FBEBC9; }
  .opt-tile.reveal-correct{ border-color:var(--green-ok); background:#DEF3E3; color:var(--green-ok); }
  .opt-tile.reveal-wrong{ border-color:var(--coral); background:#FBDFD6; color:var(--coral); }
  .opt-tile.disabled{ cursor:default; }

  .btn{
    font-family:'Tajawal', sans-serif;
    font-weight:800;
    border:none;
    border-radius:14px;
    padding:12px 22px;
    font-size:.95rem;
    cursor:pointer;
    transition:.12s ease;
  }
  .btn-primary{ background:var(--yellow); color:#FFFFFF; }
  .btn-primary:disabled{ background:var(--panel-alt); color:var(--ink-dim); cursor:not-allowed; }
  .btn-ghost{ background:var(--panel); border:2px solid var(--ink); color:var(--ink); }
  .btn-row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

  .feedback{
    margin:10px 0 16px;
    font-size:.98rem;
    min-height:24px;
    font-weight:800;
  }
  .feedback.ok{ color:var(--green-ok); }
  .feedback.no{ color:var(--coral); }

  .back-link{
    display:block;
    text-align:center;
    margin-top:16px;
    color:var(--ink-dim);
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
    text-decoration:underline;
  }

  /* ---------- Summary screen ---------- */
  .summary-card{
    background:var(--panel);
    border:2px solid var(--ink);
    border-radius:22px;
    padding:30px 20px;
    text-align:center;
  }
  .summary-card h2{ font-family:'Reem Kufi', sans-serif; font-weight:700; color:var(--ink); margin-top:0; }
  .summary-grid{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:18px 0 24px;
    flex-wrap:wrap;
  }
  .summary-item{ min-width:80px; }
  .summary-item b{ display:block; font-family:'Reem Kufi', sans-serif; font-weight:700; font-size:1.6rem; color:var(--ink); }
  .summary-item span{ font-size:.8rem; font-weight:700; color:var(--ink-dim); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="brand">
    <h1>🖍️ التدرب على جدول الضرب</h1>
    <p>خمّن الضرب الصحيح لكل ناتج، وأكمل الاختبارات التراكمية بين المستويات</p>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">⭐ نقاطي: <b id="stat-points">0</b></div>
    <div class="stat-chip">❌ أخطاء: <b id="stat-wrong">0</b></div>
  </div>

  <div id="screen-home" class="screen active"></div>
  <div id="screen-game" class="screen"></div>
  <div id="screen-summary" class="screen"></div>
</div>

<script>
/* ============ BUILD LEVEL / TEST SEQUENCE ============ */
const BASE_RANGES = [
  [1,9],[10,19],[20,29],[30,39],[40,49],
  [50,59],[60,69],[70,79],[80,89],[90,99]
];
const LEVEL_COLORS = ['yellow','blue','lilac'];

const LEVELS = [];
let prevId = null;
BASE_RANGES.forEach((range, idx) => {
  const levelNum = idx + 1;
  const levelId = 'l' + levelNum;
  LEVELS.push({
    id: levelId,
    kind: 'level',
    name: 'المستوى ' + levelNum,
    range: range[0] + ' – ' + range[1],
    ranges: [range],
    unlockedBy: prevId,
    color: LEVEL_COLORS[idx % LEVEL_COLORS.length],
    icon: String(levelNum)
  });
  prevId = levelId;

  // after level 2 onward, insert a cumulative test covering levels 1..levelNum
  if(idx >= 1){
    const testNum = idx; // after l2 -> test1, after l3 -> test2, ... after l10 -> test9
    const testId = 't' + testNum;
    const isFinal = (levelNum === BASE_RANGES.length);
    LEVELS.push({
      id: testId,
      kind: 'test',
      name: 'الاختبار ' + testNum + (isFinal ? ' (الأخير)' : ''),
      range: '1 – ' + range[1],
      ranges: BASE_RANGES.slice(0, idx + 1),
      unlockedBy: prevId,
      color: 'coral',
      icon: String(testNum)
    });
    prevId = testId;
  }
});

/* per-item progress state (in-memory only, resets on page reload) */
const state = {};
LEVELS.forEach(l => state[l.id] = { completed:false, mistakes:[] });

let totalPoints = 0;
let totalWrong = 0;

let session = null; // current game session

/* ============ MATH HELPERS ============ */
const MAX_FACTOR = 10; // no factor in any operation may exceed this
function isPrime(n){
  if(n < 2) return false;
  for(let i = 2; i*i <= n; i++){ if(n % i === 0) return false; }
  return true;
}
function factorPairs(n){
  // returns unordered factor pairs [a,b] with 1 < a,b <= MAX_FACTOR (excludes multiplying by 1 and any factor over MAX_FACTOR)
  const pairs = [];
  for(let i = 2; i*i <= n; i++){
    if(n % i === 0){
      const j = n / i;
      if(j > 1 && i <= MAX_FACTOR && j <= MAX_FACTOR) pairs.push([i, j]);
    }
  }
  return pairs;
}
function poolFor(level){
  const nums = [];
  level.ranges.forEach(([lo, hi]) => {
    for(let n = lo; n <= hi; n++){
      // exclude 1, primes, and any result whose only factorizations exceed MAX_FACTOR
      if(n > 1 && !isPrime(n) && factorPairs(n).length > 0) nums.push(n);
    }
  });
  return nums;
}
function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function generateOptions(target){
  const correctPairs = factorPairs(target);
  let options = correctPairs.map(p => ({ a:p[0], b:p[1], correct:true }));

  function hasPair(a, b){
    return options.some(o => (o.a===a && o.b===b) || (o.a===b && o.b===a));
  }
  let attempts = 0;
  while(options.length < 4 && attempts < 300){
    attempts++;
    const a = 2 + Math.floor(Math.random()*(MAX_FACTOR-1));
    const b = 2 + Math.floor(Math.random()*(MAX_FACTOR-1));
    if(a*b === target) continue;
    if(hasPair(a,b)) continue;
    options.push({ a, b, correct:false });
  }
  options = options.map(o => {
    if(Math.random() < 0.5) return { ...o, da:o.a, db:o.b };
    return { ...o, da:o.b, db:o.a };
  });
  shuffle(options);
  return options;
}

/* ============ PROGRESS LOGIC ============ */
function isUnlocked(level){
  return true; // all sections are available; user may start from any level or test
}
function nextItemAfter(id){
  return LEVELS.find(l => l.unlockedBy === id);
}

/* ============ RENDER: HOME ============ */
function renderHome(){
  const el = document.getElementById('screen-home');
  let rows = LEVELS.map(level => {
    const st = state[level.id];
    const mistakesCount = st.mistakes.length;
    const isTest = level.kind === 'test';
    const medallionClasses = ['medallion', 'c-' + level.color];
    if(isTest) medallionClasses.push('is-test');
    const rowClasses = ['level-row'];
    if(isTest) rowClasses.push('is-test');

    return `
      <div class="${rowClasses.join(' ')}">
        <div class="${medallionClasses.join(' ')}" onclick="onLevelClick('${level.id}')">
          ${st.completed ? '<div class="badge-done">✓</div>' : ''}
          ${isTest ? '📝' : level.icon}
        </div>
        <div class="level-info">
          <h3>${level.name}</h3>
          <span class="range">النتائج من ${level.range}</span>
          ${ mistakesCount > 0 ? `<div class="mistake-link" onclick="startLevel('${level.id}', true)">إعادة تدريب على الأخطاء (${mistakesCount})</div>` : '' }
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `<div class="path-wrap"><div class="path-line"></div>${rows}</div>`;
}
function onLevelClick(levelId){
  startLevel(levelId, false);
}

/* ============ GAME FLOW ============ */
function startLevel(levelId, retrain){
  const level = LEVELS.find(l => l.id === levelId);
  const pool = retrain ? [...state[levelId].mistakes] : poolFor(level);
  if(pool.length === 0){ renderHome(); showScreen('home'); return; }
  shuffle(pool);
  session = {
    levelId,
    isRetrain: retrain,
    queue: pool,
    index: 0,
    correct: 0,
    wrong: 0,
    pointsEarned: 0,
    currentTarget: null,
    currentOptions: null,
    selected: new Set(),
    answered: false
  };
  nextQuestion();
  showScreen('game');
}
function nextQuestion(){
  if(session.index >= session.queue.length){
    finishLevel();
    return;
  }
  session.currentTarget = session.queue[session.index];
  session.currentOptions = generateOptions(session.currentTarget);
  session.selected = new Set();
  session.answered = false;
  renderGame();
}
function toggleOption(idx){
  if(session.answered) return;
  if(session.selected.has(idx)) session.selected.delete(idx);
  else session.selected.add(idx);
  renderGame();
}
function submitAnswer(){
  if(session.answered || session.selected.size === 0) return;
  session.answered = true;

  const correctIdx = new Set(
    session.currentOptions.map((o,i)=> o.correct ? i : null).filter(i => i !== null)
  );
  const isCorrect = correctIdx.size === session.selected.size &&
                     [...correctIdx].every(i => session.selected.has(i));

  const target = session.currentTarget;
  const st = state[session.levelId];

  if(isCorrect){
    session.correct++;
    session.pointsEarned += 10;
    totalPoints += 10;
    st.mistakes = st.mistakes.filter(n => n !== target);
  } else {
    session.wrong++;
    totalWrong++;
    if(!st.mistakes.includes(target)) st.mistakes.push(target);
  }
  updateStatsBar();
  renderGame();
}
function finishLevel(){
  if(!session.isRetrain){
    state[session.levelId].completed = true;
  }
  renderSummary();
  showScreen('summary');
}

/* ============ RENDER: GAME ============ */
function renderGame(){
  const el = document.getElementById('screen-game');
  const total = session.queue.length;
  const qNum = Math.min(session.index + 1, total);
  const levelObj = LEVELS.find(l => l.id === session.levelId);

  const tiles = session.currentOptions.map((o, i) => {
    let cls = 'opt-tile';
    if(session.selected.has(i) && !session.answered) cls += ' selected';
    if(session.answered){
      cls += ' disabled';
      if(o.correct) cls += ' reveal-correct';
      else if(session.selected.has(i)) cls += ' reveal-wrong';
    }
    return `<div class="${cls}" onclick="toggleOption(${i})">${o.da} × ${o.db}</div>`;
  }).join('');

  let feedback = '';
  if(session.answered){
    const correctIdx = session.currentOptions
      .map((o,i)=> o.correct ? i : null).filter(i=>i!==null);
    const correctSelected = correctIdx.length === session.selected.size &&
      correctIdx.every(i => session.selected.has(i));
    if(correctSelected){
      feedback = `<div class="feedback ok">✅ صحيح! +10 نقاط</div>`;
    } else {
      const answers = session.currentOptions
        .filter(o=>o.correct)
        .map(o=>`${o.da} × ${o.db}`)
        .join('   ،   ');
      feedback = `<div class="feedback no">❌ خطأ — الإجابة الصحيحة: ${answers}</div>`;
    }
  }

  el.innerHTML = `
    <div class="game-card">
      <div class="game-progress">سؤال ${qNum} من ${total} — ${session.isRetrain ? 'تدريب على الأخطاء' : levelObj.name}</div>
      <div class="target-circle">${session.currentTarget}</div>
      <div class="hint">اختر كل عمليات الضرب التي تعطي هذا الناتج (قد يكون أكثر من إجابة صحيحة)</div>
      <div class="options-grid">${tiles}</div>
      ${feedback}
      <div class="btn-row">
        ${session.answered
          ? `<button class="btn btn-primary" onclick="nextQuestionAdvance()">التالي ▶</button>`
          : `<button class="btn btn-primary" onclick="submitAnswer()" ${session.selected.size===0?'disabled':''}>تأكيد الإجابة</button>`
        }
      </div>
      <div class="back-link" onclick="confirmExit()">⟵ رجوع للقائمة الرئيسية</div>
    </div>
  `;
}
function nextQuestionAdvance(){
  session.index++;
  nextQuestion();
}
function confirmExit(){
  renderHome();
  showScreen('home');
}

/* ============ RENDER: SUMMARY ============ */
function renderSummary(){
  const el = document.getElementById('screen-summary');
  const level = LEVELS.find(l => l.id === session.levelId);
  const st = state[session.levelId];
  const mistakesCount = st.mistakes.length;
  const next = session.isRetrain ? null : nextItemAfter(session.levelId);

  el.innerHTML = `
    <div class="summary-card">
      <h2>${session.isRetrain ? '🔁 انتهى التدريب على الأخطاء' : '🎉 أتممت ' + level.name}</h2>
      <div class="summary-grid">
        <div class="summary-item"><b>${session.correct}</b><span>إجابات صحيحة</span></div>
        <div class="summary-item"><b>${session.wrong}</b><span>إجابات خاطئة</span></div>
        <div class="summary-item"><b>+${session.pointsEarned}</b><span>نقاط في هذه الجولة</span></div>
      </div>
      <div class="btn-row">
        ${mistakesCount > 0 ? `<button class="btn btn-ghost" onclick="startLevel('${session.levelId}', true)">إعادة تدريب على الأخطاء (${mistakesCount})</button>` : ''}
        ${next ? `<button class="btn btn-primary" onclick="startLevel('${next.id}', false)">الاستمرار ← ${next.name} ▶</button>` : ''}
      </div>
      <div class="back-link" onclick="confirmExit()">⟵ رجوع للقائمة الرئيسية</div>
    </div>
  `;
}

/* ============ SCREEN SWITCH / STATS ============ */
function showScreen(name){
  ['home','game','summary'].forEach(n => {
    document.getElementById('screen-' + n).classList.toggle('active', n === name);
  });
}
function updateStatsBar(){
  document.getElementById('stat-points').textContent = totalPoints;
  document.getElementById('stat-wrong').textContent = totalWrong;
}

/* ============ INIT ============ */
renderHome();
updateStatsBar();
</script>
</body>
</html>
